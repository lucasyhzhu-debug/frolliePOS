name: e2e

on:
  push:
    branches: [main]
    # Docs/planning-only changes can't affect e2e behaviour — skip the run to
    # save CI minutes (and avoid needlessly queueing on the shared-dev lock below).
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"

# Serialize ALL e2e runs onto one global lock — every run reseeds the SHARED dev
# Convex deployment (fixture `seed:reset`), so two overlapping runs (e.g. a PR run
# and its post-merge main run firing seconds apart) wipe each other's data
# mid-test and flake. A ref-keyed group did NOT prevent that (different refs =
# different groups). Global group + no-cancel = runs queue and never overlap.
concurrency:
  group: e2e-shared-dev
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_CONVEX_URL: ${{ secrets.CONVEX_DEV_URL }}
      # XENDIT_SECRET_KEY is intentionally NOT set here: the e2e simulate helper
      # must use the SAME Xendit key the deployment uses to CREATE the charge,
      # otherwise create/simulate hit different accounts → 404 DATA_NOT_FOUND /
      # CALLBACK_VIRTUAL_ACCOUNT_NOT_FOUND. It is sourced from the deployed
      # deployment after `convex deploy` (see step below; issue-#43 triage).
      XENDIT_CALLBACK_TOKEN: ${{ secrets.XENDIT_CALLBACK_TOKEN_DEV }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_DEV }}
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # `npm install` (not `npm ci`): the lockfile is maintained on Windows and
      # omits Linux-only platform-gated optional deps (canvas stub override +
      # @emnapi/*), which makes strict `npm ci` fail on ubuntu before tests run.
      # `npm install` reconciles per-platform. Trade-off: loses ci's strict
      # lock-reproducibility — acceptable for an e2e runner whose value is the
      # browser tests, not dependency pinning.
      - run: npm install --no-audit --no-fund
      # Resolve the installed Playwright version so the browser cache key tracks
      # it — a version bump invalidates the cache and forces a fresh download.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      # OS deps (apt) always; browser download only on a cache miss, with retries.
      # Playwright's own 5 internal retries did NOT survive a transient
      # cdn.playwright.dev ECONNRESET (PR #76 e2e flake), so wrap the install in an
      # outer retry loop — a cache hit skips the download entirely.
      - name: Install Playwright browser (cached + retried)
        run: |
          npx playwright install-deps chromium
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" != "true" ]; then
            n=0
            until [ "$n" -ge 3 ]; do
              npx playwright install chromium && break
              n=$((n + 1))
              echo "playwright browser download failed (attempt $n/3); retrying in 15s..."
              sleep 15
            done
            if [ "$n" -ge 3 ]; then
              echo "::error::Playwright browser download failed after 3 attempts (cdn.playwright.dev)"
              exit 1
            fi
          fi
      - run: npx convex deploy --cmd-url-env-var-name VITE_CONVEX_URL
      # Source the Xendit secret from the just-deployed deployment so the simulate
      # helper and the charge-creating Convex action use the SAME Xendit account
      # (create/simulate key parity). Fails loudly if the deployment has no key set.
      - name: Source Xendit secret key from the deployed deployment
        run: |
          KEY=$(npx convex env get XENDIT_SECRET_KEY)
          if [ -z "$KEY" ]; then echo "::error::XENDIT_SECRET_KEY not set on the deployment"; exit 1; fi
          echo "XENDIT_SECRET_KEY=$KEY" >> "$GITHUB_ENV"
      - run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
