<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Proofing Room — deck review &amp; pinned comments</title>

<!-- Same brand faces as the decks: Arvo / Lato / JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Arvo:ital,wght@0,400;0,700;1,400&family=Lato:ital,wght@0,300;0,400;0,700;0,900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
/* =========================================================================
   PROOFING ROOM — pinned-comment review GUI for the two talk decks.
   Click anywhere on a slide to drop a numbered pin (Google-Sheets-style
   anchored comment). Coordinates are stored as % of the 1920×1080 stage,
   exported as JSON for the frontend-slides editing pass.
   ========================================================================= */
:root{
  --paper:#102821; --paper-2:#163630; --paper-3:#1E4740;
  --ink:#F1E9D8; --ink-2:#D4CBB9; --ink-3:#8E8878; --ink-4:#5E594E;
  --line:rgba(241,233,216,0.09); --line-strong:rgba(241,233,216,0.20);
  --citrus:#F9A84A; --citrus-deep:#E08B25; --citrus-soft:rgba(249,168,74,0.16);
  --cobalt:#8CA6FF; --moss:#8FA888; --clay:#DB8461;
  --serif:'Arvo','Rockwell',Georgia,serif;
  --sans:'Lato',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
  --sidebar-w:392px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0a1714;color:var(--ink);font-family:var(--sans)}

/* ---------------- top chrome ---------------- */
header{
  position:fixed;inset:0 0 auto 0;height:58px;z-index:40;
  display:flex;align-items:center;gap:16px;padding:0 18px;
  background:linear-gradient(180deg,#0d1f1a, #0a1714);
  border-bottom:1px solid var(--line-strong);
}
.brand{display:flex;align-items:baseline;gap:10px;white-space:nowrap}
.brand .room{font-family:var(--serif);font-weight:700;font-size:17px;letter-spacing:.01em}
.brand .sub{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase}

.deck-tabs{display:flex;gap:6px;margin-left:8px}
.deck-tab{
  font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;
  padding:7px 14px;border:1px solid var(--line-strong);border-radius:999px;
  background:transparent;color:var(--ink-2);cursor:pointer;
  transition:all .18s ease;white-space:nowrap;
}
.deck-tab:hover{border-color:var(--citrus);color:var(--ink)}
.deck-tab.active{background:var(--citrus);border-color:var(--citrus);color:#19140b;font-weight:700}
.deck-tab .n{display:inline-block;min-width:17px;height:17px;line-height:17px;text-align:center;
  border-radius:999px;background:rgba(0,0,0,0.25);font-size:10px;margin-left:7px;vertical-align:1px}
.deck-tab:not(.active) .n{background:var(--citrus-soft);color:var(--citrus)}

.spacer{flex:1}

.slide-nav{display:flex;align-items:center;gap:10px}
.slide-nav button{
  font-family:var(--mono);font-size:12px;padding:7px 13px;cursor:pointer;
  background:var(--paper-2);color:var(--ink);border:1px solid var(--line-strong);border-radius:8px;
  transition:all .15s ease;
}
.slide-nav button:hover{border-color:var(--citrus);color:var(--citrus)}
#counter{font-family:var(--mono);font-size:12.5px;color:var(--ink-2);min-width:74px;text-align:center;letter-spacing:.08em}

.actions{display:flex;gap:8px}
.actions button{
  font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;padding:8px 14px;cursor:pointer;
  border-radius:8px;border:1px solid var(--line-strong);background:transparent;color:var(--ink-2);
  transition:all .15s ease;white-space:nowrap;
}
.actions button:hover{border-color:var(--citrus);color:var(--citrus)}
.actions button.primary{background:var(--citrus);border-color:var(--citrus);color:#19140b;font-weight:700}
.actions button.primary:hover{background:var(--citrus-deep);border-color:var(--citrus-deep);color:#19140b}
.actions button.danger:hover{border-color:var(--clay);color:var(--clay)}

/* ---------------- stage area ---------------- */
.workbench{position:fixed;top:58px;left:0;right:var(--sidebar-w);bottom:0;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(1100px 700px at 70% -10%, rgba(140,166,255,0.07), transparent 60%),
    #0a1714;}
.frame-wrap{position:relative;width:100%;height:100%}
#deckFrame{position:absolute;inset:0;width:100%;height:100%;border:0;background:#0a1714}

/* click-capture overlay — sits exactly over the iframe */
#overlay{position:absolute;inset:0;cursor:crosshair;z-index:10}
#overlay.nav-mode{cursor:default;pointer-events:none}

/* the letterboxed stage outline so you can see the live 16:9 area */
#stageGhost{position:absolute;border:1px dashed rgba(249,168,74,0.35);pointer-events:none;z-index:9;
  box-shadow:0 0 0 9999px rgba(5,12,10,0.45)}

/* ---------------- pins ---------------- */
.pin{
  position:absolute;z-index:12;transform:translate(-50%,-100%);
  width:30px;height:30px;cursor:pointer;pointer-events:auto;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));
  transition:transform .15s ease;
}
.pin:hover{transform:translate(-50%,-100%) scale(1.15)}
.pin .flag{
  width:30px;height:30px;border-radius:50% 50% 50% 4px;
  background:var(--citrus);border:2px solid #19140b;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:12.5px;color:#19140b;
  transform:rotate(0deg);
}
.pin.resolved .flag{background:var(--moss);opacity:.55}
.pin.pulse .flag{animation:pinPulse 1s ease 2}
@keyframes pinPulse{0%,100%{box-shadow:0 0 0 0 rgba(249,168,74,0.7)}50%{box-shadow:0 0 0 14px rgba(249,168,74,0)}}

/* ---------------- composer card ---------------- */
#composer{
  position:absolute;z-index:30;width:300px;
  background:#F6EFDF;color:#241f14;border-radius:10px;
  border:1px solid #d9cdb2;box-shadow:0 14px 40px rgba(0,0,0,0.55);
  padding:12px;display:none;
  animation:composerIn .16s ease;
}
@keyframes composerIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#composer .meta{font-family:var(--mono);font-size:10px;color:#8a7d5e;letter-spacing:.06em;margin-bottom:8px;display:flex;justify-content:space-between}
#composer textarea{
  width:100%;min-height:74px;resize:vertical;border:1px solid #d9cdb2;border-radius:7px;
  background:#fffdf6;padding:9px 10px;font-family:var(--sans);font-size:13.5px;line-height:1.45;color:#241f14;
}
#composer textarea:focus{outline:2px solid var(--citrus);outline-offset:-1px;border-color:transparent}
#composer .row{display:flex;gap:8px;margin-top:9px;justify-content:flex-end}
#composer .row button{
  font-family:var(--mono);font-size:11px;padding:6px 13px;border-radius:7px;cursor:pointer;border:1px solid #d9cdb2;background:transparent;color:#6b5f44;
}
#composer .row button.save{background:var(--citrus);border-color:var(--citrus-deep);color:#19140b;font-weight:700}
#composer .row button.save:hover{background:var(--citrus-deep)}
#composer .hint{font-family:var(--mono);font-size:9.5px;color:#a39570;margin-top:7px}

/* ---------------- sidebar ---------------- */
aside{
  position:fixed;top:58px;right:0;bottom:0;width:var(--sidebar-w);z-index:20;
  background:linear-gradient(180deg,#11271f,#0d1f19);
  border-left:1px solid var(--line-strong);
  display:flex;flex-direction:column;
}
aside .head{padding:16px 18px 12px;border-bottom:1px solid var(--line)}
aside .head h2{font-family:var(--serif);font-size:15.5px;font-weight:700;letter-spacing:.01em}
aside .head .stats{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:5px;letter-spacing:.05em}
aside .head .stats b{color:var(--citrus);font-weight:500}

#commentList{flex:1;overflow-y:auto;padding:10px 12px 24px;scrollbar-width:thin;scrollbar-color:var(--paper-3) transparent}

.slide-group{margin-top:12px}
.slide-group .gh{
  font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);
  padding:4px 6px;display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:6px;
}
.slide-group .gh:hover{color:var(--citrus)}
.slide-group .gh::after{content:"";flex:1;height:1px;background:var(--line)}

.comment-card{
  margin:7px 0;padding:11px 12px 9px;border-radius:9px;cursor:pointer;
  background:var(--paper-2);border:1px solid var(--line);
  transition:border-color .15s ease, transform .15s ease;
}
.comment-card:hover{border-color:rgba(249,168,74,0.5)}
.comment-card.active{border-color:var(--citrus);background:var(--paper-3)}
.comment-card.resolved{opacity:.5}
.comment-card .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.comment-card .badge{
  width:21px;height:21px;border-radius:50% 50% 50% 3px;flex:none;
  background:var(--citrus);color:#19140b;font-family:var(--mono);font-weight:700;font-size:10.5px;
  display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(0,0,0,0.3);
}
.comment-card.resolved .badge{background:var(--moss)}
.comment-card .coords{font-family:var(--mono);font-size:9.5px;color:var(--ink-3);letter-spacing:.04em}
.comment-card .top .tools{margin-left:auto;display:flex;gap:2px}
.comment-card .top .tools button{
  width:24px;height:24px;border:none;background:transparent;color:var(--ink-3);cursor:pointer;
  border-radius:6px;font-size:12px;line-height:1;
}
.comment-card .top .tools button:hover{background:var(--paper);color:var(--citrus)}
.comment-card .body{font-size:13px;line-height:1.5;color:var(--ink);white-space:pre-wrap;word-wrap:break-word}
.comment-card .body[contenteditable="true"]{outline:1.5px solid var(--citrus);border-radius:5px;padding:3px 5px;background:rgba(0,0,0,0.18)}
.comment-card .when{font-family:var(--mono);font-size:9px;color:var(--ink-4);margin-top:7px;letter-spacing:.05em}

.empty{
  margin:48px 20px;text-align:center;color:var(--ink-3);
}
.empty .glyph{font-family:var(--serif);font-size:40px;color:var(--citrus);opacity:.65;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.6}
.empty .kbd{font-family:var(--mono);font-size:10.5px;background:var(--paper-2);border:1px solid var(--line-strong);
  border-radius:5px;padding:2px 7px;color:var(--ink-2)}

/* toast */
#toast{
  position:fixed;left:50%;bottom:26px;transform:translate(-50%,80px);z-index:60;
  font-family:var(--mono);font-size:12px;letter-spacing:.03em;
  background:#F6EFDF;color:#241f14;padding:10px 20px;border-radius:999px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);transition:transform .25s cubic-bezier(0.16,1,0.3,1);
}
#toast.show{transform:translate(-50%,0)}

/* footer hint strip */
.hintbar{
  position:fixed;left:0;bottom:0;right:var(--sidebar-w);z-index:15;pointer-events:none;
  display:flex;justify-content:center;padding:10px;
}
.hintbar span{
  font-family:var(--mono);font-size:10px;letter-spacing:.07em;color:var(--ink-3);
  background:rgba(10,23,20,0.8);border:1px solid var(--line);border-radius:999px;padding:5px 14px;
  backdrop-filter:blur(4px);
}
.hintbar b{color:var(--citrus);font-weight:500}
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="room">Proofing Room</span>
    <span class="sub">pin · comment · export</span>
  </div>
  <nav class="deck-tabs" id="deckTabs"></nav>
  <div class="spacer"></div>
  <div class="slide-nav">
    <button id="prevBtn" aria-label="Previous slide">◀ prev</button>
    <span id="counter">– / –</span>
    <button id="nextBtn" aria-label="Next slide">next ▶</button>
  </div>
  <div class="actions">
    <button id="copyBtn">copy JSON</button>
    <button id="downloadBtn" class="primary">⬇ export JSON</button>
    <button id="clearBtn" class="danger">clear deck</button>
  </div>
</header>

<div class="workbench">
  <div class="frame-wrap">
    <iframe id="deckFrame" title="deck under review"></iframe>
    <div id="stageGhost" hidden></div>
    <div id="overlay"></div>
  </div>
</div>

<div class="hintbar"><span><b>click</b> a slide to pin a comment &nbsp;·&nbsp; <b>← →</b> change slide &nbsp;·&nbsp; <b>esc</b> cancel</span></div>

<div id="composer">
  <div class="meta"><span id="composerMeta">slide – · –% , –%</span><span>new comment</span></div>
  <textarea id="composerText" placeholder="What should change here?"></textarea>
  <div class="row">
    <button id="composerCancel">cancel</button>
    <button id="composerSave" class="save">save pin</button>
  </div>
  <div class="hint">⌘/Ctrl+Enter to save · Esc to cancel</div>
</div>

<aside>
  <div class="head">
    <h2 id="deckTitle">—</h2>
    <div class="stats" id="stats">0 comments</div>
  </div>
  <div id="commentList"></div>
</aside>

<div id="toast"></div>

<script>
/* ============================================================
   Proofing Room controller
   ============================================================ */
const DECKS = [
  { file:'frolliepos-talk.html',        label:'CEO talk',        title:'Frollie POS — peer-CEO talk' },
  { file:'force-times-direction.html',  label:'Force × Direction', title:'Force × Direction — strategy talk' },
];
const STAGE_W = 1920, STAGE_H = 1080;
const storeKey = f => `proofing-room:v2:${f}`; // v2 — round-1 pins archived under the un-versioned key (2026-06-10)

const $ = id => document.getElementById(id);
const frame = $('deckFrame'), overlay = $('overlay'), ghost = $('stageGhost');
const composer = $('composer'), composerText = $('composerText');

let deck = DECKS[0];
let slides = [];            // live slide elements inside the iframe
let cur = 0;                // current slide index (0-based)
let comments = [];          // {id, slide, xPct, yPct, text, createdAt, resolved}
let draft = null;           // pending pin {slide,xPct,yPct}
let pollTimer = null;

/* ---------- persistence ---------- */
function load(){ try{ comments = JSON.parse(localStorage.getItem(storeKey(deck.file))) || []; }catch{ comments = []; } }
function save(){ localStorage.setItem(storeKey(deck.file), JSON.stringify(comments)); }

/* ---------- deck tabs ---------- */
function renderTabs(){
  $('deckTabs').innerHTML = DECKS.map((d,i)=>{
    let n = 0; try{ n = (JSON.parse(localStorage.getItem(storeKey(d.file)))||[]).filter(c=>!c.resolved).length; }catch{}
    return `<button class="deck-tab ${d===deck?'active':''}" data-i="${i}">${d.label}<span class="n">${n}</span></button>`;
  }).join('');
  [...document.querySelectorAll('.deck-tab')].forEach(b=>b.onclick=()=>switchDeck(DECKS[+b.dataset.i]));
}
function switchDeck(d){
  if(d===deck) return;
  deck = d; cancelDraft();
  const url = new URL(location); url.searchParams.set('deck', d.file); history.replaceState(null,'',url);
  boot();
}

/* ---------- iframe boot + slide control ---------- */
function boot(){
  clearInterval(pollTimer);
  slides = []; cur = 0;
  load(); renderTabs();
  $('deckTitle').textContent = deck.title;
  frame.src = deck.file;
  frame.onload = () => {
    const doc = frame.contentDocument;
    slides = [...doc.querySelectorAll('.slide')];
    showSlide(0);
    // keep parent in sync if anything inside the deck changes slides
    pollTimer = setInterval(()=>{
      const v = slides.findIndex(s=>s.classList.contains('visible'));
      if(v>=0 && v!==cur){ cur=v; slides[cur].querySelectorAll('.frag').forEach(f=>f.classList.add('on')); paint(); }
      fitGhost();
    }, 350);
    fitGhost(); paint();
  };
}
function showSlide(n){
  if(!slides.length) return;
  cur = Math.max(0, Math.min(n, slides.length-1));
  slides.forEach((s,k)=>s.classList.toggle('visible', k===cur));
  // reviewers see the finished slide: force-reveal click-through fragments
  slides[cur].querySelectorAll('.frag').forEach(f=>f.classList.add('on'));
  // keep the deck's own HUD honest
  const doc = frame.contentDocument;
  const c = doc.getElementById('counter');
  if(c) c.textContent = `${String(cur+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;
  const p = doc.getElementById('progress');
  if(p) p.style.width = `${((cur+1)/slides.length)*100}%`;
  cancelDraft(); paint();
}

/* ---------- stage geometry (mirror of the deck's scale()) ---------- */
function stageRect(){
  const w = overlay.clientWidth, h = overlay.clientHeight;
  const f = Math.min(w/STAGE_W, h/STAGE_H);
  return { x:(w-STAGE_W*f)/2, y:(h-STAGE_H*f)/2, f };
}
function fitGhost(){
  const {x,y,f} = stageRect();
  ghost.hidden = false;
  Object.assign(ghost.style,{left:x+'px',top:y+'px',width:STAGE_W*f+'px',height:STAGE_H*f+'px'});
}
addEventListener('resize', fitGhost);

/* ---------- pins ---------- */
function paint(){
  // wipe old pins
  [...overlay.querySelectorAll('.pin')].forEach(p=>p.remove());
  const {x,y,f} = stageRect();
  comments.filter(c=>c.slide===cur+1).forEach(c=>{
    const el = document.createElement('div');
    el.className = 'pin'+(c.resolved?' resolved':'');
    el.dataset.id = c.id;
    el.style.left = (x + c.xPct/100*STAGE_W*f)+'px';
    el.style.top  = (y + c.yPct/100*STAGE_H*f)+'px';
    el.innerHTML = `<div class="flag">${num(c)}</div>`;
    el.onclick = e => { e.stopPropagation(); focusCard(c.id); };
    overlay.appendChild(el);
  });
  renderList(); renderTabs();
  $('counter').textContent = slides.length ? `${String(cur+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}` : '– / –';
}
function num(c){ return comments.indexOf(c)+1; }

/* ---------- click → composer ---------- */
overlay.addEventListener('click', e => {
  if(composer.style.display==='block'){ cancelDraft(); return; }
  const {x,y,f} = stageRect();
  const r = overlay.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  const sx = (px-x)/f, sy = (py-y)/f;
  if(sx<0||sy<0||sx>STAGE_W||sy>STAGE_H) return;   // outside the 16:9 stage
  draft = { slide:cur+1, xPct:+(sx/STAGE_W*100).toFixed(2), yPct:+(sy/STAGE_H*100).toFixed(2) };
  $('composerMeta').textContent = `slide ${draft.slide} · ${draft.xPct}% , ${draft.yPct}%`;
  composer.style.display='block';
  const cw=300, ch=190;
  composer.style.left = Math.min(Math.max(8, e.clientX+14), innerWidth-cw-410)+'px';
  composer.style.top  = Math.min(Math.max(66, e.clientY-20), innerHeight-ch-12)+'px';
  composerText.value=''; composerText.focus();
});
function cancelDraft(){ draft=null; composer.style.display='none'; }
function saveDraft(){
  const text = composerText.value.trim();
  if(!draft || !text) { cancelDraft(); return; }
  comments.push({ id:'c'+Math.random().toString(36).slice(2,9), ...draft, text, createdAt:new Date().toISOString(), resolved:false });
  save(); cancelDraft(); paint();
  toast('pin saved');
}
$('composerSave').onclick = saveDraft;
$('composerCancel').onclick = cancelDraft;
composerText.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey) && e.key==='Enter'){ e.preventDefault(); saveDraft(); }
  if(e.key==='Escape'){ e.preventDefault(); cancelDraft(); }
});

/* ---------- sidebar ---------- */
function renderList(){
  const open = comments.filter(c=>!c.resolved).length;
  $('stats').textContent = `${comments.length} comment${comments.length===1?'':'s'} · ${open} open`;
  const list = $('commentList');
  if(!comments.length){
    list.innerHTML = `<div class="empty">
      <div class="glyph">✎</div>
      <p>No comments yet on this deck.<br/>Click anywhere on a slide to drop a pin —<br/>navigate with <span class="kbd">←</span> <span class="kbd">→</span></p>
    </div>`;
    return;
  }
  const bySlide = {};
  comments.forEach(c=>{ (bySlide[c.slide] ||= []).push(c); });
  list.innerHTML = Object.keys(bySlide).sort((a,b)=>a-b).map(s=>`
    <div class="slide-group">
      <div class="gh" data-jump="${s}">Slide ${s} · ${bySlide[s].length}</div>
      ${bySlide[s].map(c=>`
        <div class="comment-card ${c.resolved?'resolved':''}" data-id="${c.id}">
          <div class="top">
            <span class="badge">${num(c)}</span>
            <span class="coords">${c.xPct}% , ${c.yPct}%</span>
            <span class="tools">
              <button data-act="edit"    title="edit">✎</button>
              <button data-act="resolve" title="${c.resolved?'reopen':'resolve'}">${c.resolved?'↺':'✓'}</button>
              <button data-act="del"     title="delete">✕</button>
            </span>
          </div>
          <div class="body">${esc(c.text)}</div>
          <div class="when">${new Date(c.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
        </div>`).join('')}
    </div>`).join('');

  [...list.querySelectorAll('.gh')].forEach(g=>g.onclick=()=>showSlide(+g.dataset.jump-1));
  [...list.querySelectorAll('.comment-card')].forEach(card=>{
    const c = comments.find(x=>x.id===card.dataset.id);
    card.onclick = e => {
      const act = e.target.dataset?.act;
      if(act==='del'){ comments = comments.filter(x=>x!==c); save(); paint(); return; }
      if(act==='resolve'){ c.resolved=!c.resolved; save(); paint(); return; }
      if(act==='edit'){ inlineEdit(card, c); return; }
      if(e.target.closest('.body[contenteditable="true"]')) return;
      showSlide(c.slide-1);
      setTimeout(()=>focusCard(c.id), 60);
    };
  });
}
function inlineEdit(card, c){
  const body = card.querySelector('.body');
  body.contentEditable = 'true'; body.focus();
  const sel=getSelection(), rng=document.createRange(); rng.selectNodeContents(body); rng.collapse(false); sel.removeAllRanges(); sel.addRange(rng);
  const done = ()=>{ body.contentEditable='false'; c.text=body.innerText.trim()||c.text; save(); paint(); };
  body.onblur = done;
  body.onkeydown = e=>{ if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();body.blur();} if(e.key==='Escape'){body.innerText=c.text;body.blur();} };
}
function focusCard(id){
  const c = comments.find(x=>x.id===id); if(!c) return;
  [...document.querySelectorAll('.comment-card')].forEach(k=>k.classList.toggle('active', k.dataset.id===id));
  const card = document.querySelector(`.comment-card[data-id="${id}"]`);
  card?.scrollIntoView({block:'nearest', behavior:'smooth'});
  const pin = overlay.querySelector(`.pin[data-id="${id}"]`);
  if(pin){ pin.classList.remove('pulse'); void pin.offsetWidth; pin.classList.add('pulse'); }
}
function esc(s){ return s.replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

/* ---------- export ---------- */
function payload(){
  return JSON.stringify({
    deck: deck.file,
    deckTitle: deck.title,
    stage: { width:STAGE_W, height:STAGE_H, coordsNote:'xPct/yPct are % of the 1920×1080 slide stage, origin top-left' },
    exportedAt: new Date().toISOString(),
    comments: comments.map((c,i)=>({ n:i+1, slide:c.slide, xPct:c.xPct, yPct:c.yPct, text:c.text, resolved:c.resolved, createdAt:c.createdAt }))
  }, null, 2);
}
$('downloadBtn').onclick = ()=>{
  const blob = new Blob([payload()], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `review-comments--${deck.file.replace('.html','')}--${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('JSON downloaded — hand it to Claude');
};
$('copyBtn').onclick = async ()=>{
  await navigator.clipboard.writeText(payload());
  toast('JSON copied — paste it to Claude');
};
$('clearBtn').onclick = ()=>{
  if(!comments.length) return;
  if(confirm(`Delete all ${comments.length} comments on “${deck.label}”?`)){ comments=[]; save(); paint(); }
};

/* ---------- nav ---------- */
$('prevBtn').onclick = ()=>showSlide(cur-1);
$('nextBtn').onclick = ()=>showSlide(cur+1);
addEventListener('keydown', e=>{
  if(e.target.tagName==='TEXTAREA' || e.target.isContentEditable) return;
  if(['ArrowRight','PageDown',' '].includes(e.key)){ e.preventDefault(); showSlide(cur+1); }
  else if(['ArrowLeft','PageUp'].includes(e.key)){ e.preventDefault(); showSlide(cur-1); }
  else if(e.key==='Home'){ showSlide(0); }
  else if(e.key==='End'){ showSlide(slides.length-1); }
  else if(e.key==='Escape'){ cancelDraft(); }
});

/* ---------- toast ---------- */
let toastTimer;
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------- go ---------- */
const want = new URL(location).searchParams.get('deck');
deck = DECKS.find(d=>d.file===want) || DECKS[0];
boot();
</script>
